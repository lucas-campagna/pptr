name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build executable in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true \
            -e PKG_CACHE_PATH=/app/.pkg-cache \
            --user root \
            ghcr.io/puppeteer/puppeteer:latest \
            /bin/bash -c "npm ci --include=dev && npx pkg . --targets node18-linux-x64 --output dist/pptr --options v${{ github.ref_name }}"
      
      - name: Package dependencies
        run: |
          mkdir -p dist/deps
          
          # Copy executable
          cp dist/pptr dist/deps/pptr
          
          # Copy Chrome
          mkdir -p dist/deps/chrome
          cp -r /home/pptruser/.cache/puppeteer/chrome/*/chrome-linux/* dist/deps/chrome/
          
          # Copy required shared libraries
          for lib in libnss3 libnspr4 libatk libatspi libdrm libxkbcommon libwayland libpango libcairo libgbm; do
            cp -r /usr/lib/x86_64-linux-gnu/${lib}* dist/deps/chrome/ 2>/dev/null || true
          done
          
          # Create tarball
          cd dist/deps && tar -czvf ../deps.tar.gz *
          
          # Cleanup deps directory
          rm -rf dist/deps
          
          ls -la dist/
      
      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: pptr
          path: dist/pptr
          retention-days: 5
      
      - name: Upload deps artifact
        uses: actions/upload-artifact@v4
        with:
          name: deps
          path: dist/deps.tar.gz
          retention-days: 5

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download executable
        uses: actions/download-artifact@v4
        with:
          name: pptr
          path: dist
      
      - name: Download deps
        uses: actions/download-artifact@v4
        with:
          name: deps
          path: dist
      
      - name: Make executable
        run: chmod +x dist/pptr
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pptr
            dist/deps.tar.gz
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
