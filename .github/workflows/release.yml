name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - run: npm ci
      
      - name: Install Chrome
        run: npx @puppeteer/browsers install chrome@stable
        
      - name: Run tests
        run: npm test

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build executable in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e PKG_CACHE_PATH=/app/.pkg-cache \
            --user root \
            ghcr.io/puppeteer/puppeteer:latest \
            /bin/bash -c "npm ci --include=dev && npx pkg . --targets node18-linux-x64 --output dist/pptr"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pptr
          path: dist/pptr
          retention-days: 5

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: pptr
          path: dist
      
      - name: Make executable
        run: chmod +x dist/pptr
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/pptr
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
