name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - run: npm ci
      
      - name: Install Chrome
        run: npx @puppeteer/browsers install chrome@stable
        
      - name: Run tests
        run: npm test

  build:
    name: Build (${{ matrix.artifact }})
    needs: test
    runs-on: ${{ matrix.platform }}-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu
            target: linux
            artifact: pptr
          - platform: macos
            target: macos
            artifact: pptr
          - platform: windows
            target: win
            artifact: pptr.exe
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --include=dev
      
      - name: Install Chrome
        run: npx @puppeteer/browsers install chrome@stable
      
      - name: Build executable
        run: npx pkg . --targets node22-${{ matrix.target }}-x64 --output dist/${{ matrix.artifact }}
        env:
          PKG_CACHE_PATH: .pkg-cache
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ matrix.platform }}
          path: dist/${{ matrix.artifact }}
          retention-days: 5

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      
      - name: Display structure
        run: ls -la dist/
      
      - name: Prepare Linux binary
        if: matrix.platform != 'windows'
        run: chmod +x dist/pptr
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pptr
            dist/pptr.exe
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
