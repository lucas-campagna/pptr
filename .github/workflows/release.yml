name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - run: npm ci
      
      - name: Install Chrome
        run: npx @puppeteer/browsers install chrome@stable
        
      - name: Run tests
        run: npm test

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build executable in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true \
            -e PKG_CACHE_PATH=/app/.pkg-cache \
            --user root \
            ghcr.io/puppeteer/puppeteer:latest \
            /bin/bash -c "
              npm ci --include=dev && \
              npx pkg . --targets node18-linux-x64 --output dist/pptr && \
              mkdir -p dist/chrome && \
              cp -r /home/pptruser/.cache/puppeteer/chrome/*/chrome-linux/* dist/chrome/ && \
              cp -r /usr/lib/x86_64-linux-gnu/libnss3* dist/chrome/ 2>/dev/null || true && \
              cp -r /usr/lib/x86_64-linux-gnu/libnspr4* dist/chrome/ 2>/dev/null || true && \
              cp -r /usr/lib/x86_64-linux-gnu/libatk* dist/chrome/ 2>/dev/null || true && \
              cp -r /usr/lib/x86_64-linux-gnu/libatspi* dist/chrome/ 2>/dev/null || true && \
              cp -r /usr/lib/x86_64-linux-gnu/libdrm* dist/chrome/ 2>/dev/null || true && \
              cp -r /usr/lib/x86_64-linux-gnu/libxkbcommon* dist/chrome/ 2>/dev/null || true && \
              cp -r /usr/lib/x86_64-linux-gnu/libwayland* dist/chrome/ 2>/dev/null || true && \
              cp -r /usr/lib/x86_64-linux-gnu/libpango* dist/chrome/ 2>/dev/null || true && \
              cp -r /usr/lib/x86_64-linux-gnu/libcairo* dist/chrome/ 2>/dev/null || true && \
              cp -r /usr/lib/x86_64-linux-gnu/libgbm* dist/chrome/ 2>/dev/null || true
            "
      
      - name: Set Chrome path
        run: |
          CHROME_PATH=$(find dist/chrome -name chrome -type f | head -1)
          echo "CHROME_PATH=$CHROME_PATH"
          echo "CHROME_PATH=$CHROME_PATH" >> $GITHUB_ENV
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pptr
          path: |
            dist/pptr
            dist/chrome
          retention-days: 5

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: pptr
          path: dist
      
      - name: Make executable
        run: chmod +x dist/pptr && chmod -R 755 dist/chrome
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pptr
            dist/chrome/**
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
