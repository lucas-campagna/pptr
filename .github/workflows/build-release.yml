name: Build Release Binaries

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload to (optional)'
        required: false

jobs:
  build:
    name: Build artifacts for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: node18-linux-x64
            artifact: pptr-linux
          - os: macos-latest
            target: node18-macos-x64
            artifact: pptr-macos
          - os: windows-latest
            target: node18-win-x64
            artifact: pptr-windows
    env:
      # Resolve tag name from release event, workflow input, or push ref. Fallback to v1.9.0
      TAG_NAME: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name || 'v1.9.0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build binary with pkg
        run: |
          echo "Building target: ${{ matrix.target }}"
          npx pkg . --targets "${{ matrix.target }}" --out-path dist
        shell: bash

      - name: Show artifacts
        run: |
          npx pkg --version || true
          echo "Node: $(node -v)" || true
          echo "Listing dist contents"
          ls -la dist || true
          if [ -d dist ]; then
            for f in dist/*; do
              echo "--- $f ---"
              file "$f" || true
            done
          fi
        shell: bash

      - name: Normalize artifact names (macOS / Linux)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          echo "Normalizing artifacts for ${{ matrix.os }}"
          set -e
          shopt -s nullglob || true
          if [ ! -d dist ]; then
            echo "dist directory missing"
            exit 0
          fi
          files=(dist/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no artifacts found in dist"
            exit 0
          fi
          chosen=""
          # prefer Mach-O on macOS, ELF on linux
          for f in "${files[@]}"; do
            if file "$f" | grep -q "Mach-O" && [ "${{ matrix.os }}" = "macos-latest" ]; then
              chosen="$f"; break
            fi
            if file "$f" | grep -q "ELF" && [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
              chosen="$f"; break
            fi
          done
          if [ -z "$chosen" ]; then
            echo "Preferred file type not found; falling back to first artifact"
            chosen=${files[0]}
          fi
          echo "Chosen artifact: $chosen"
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            cp "$chosen" dist/pptr-macos || mv "$chosen" dist/pptr-macos || true
            chmod +x dist/pptr-macos || true
          else
            cp "$chosen" dist/pptr-linux || true
            chmod +x dist/pptr-linux || true
          fi

      - name: Normalize artifact names (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "Normalizing artifacts for Windows"
          $dist = Get-ChildItem -Path dist -File -ErrorAction SilentlyContinue
          if (-not $dist) {
            Write-Host "No artifacts found in dist"
            exit 0
          }
          # prefer .exe if present
          $exe = $dist | Where-Object { $_.Name -like '*.exe' } | Select-Object -First 1
          if ($exe) {
            $chosen = $exe.FullName
          } else {
            $chosen = $dist[0].FullName
          }
          Write-Host "Chosen artifact: $chosen"
          $destExe = Join-Path -Path 'dist' -ChildPath 'pptr-windows.exe'
          Move-Item $chosen -Destination $destExe -Force
          Copy-Item $destExe 'dist\pptr-windows' -Force

      - name: Show final artifacts
        run: ls -la dist || true
        shell: bash

      - name: Upload artifact to workflow
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name || 'v1.9.0' }}
    steps:
      - name: Download linux artifact
        uses: actions/download-artifact@v4
        with:
          name: pptr-linux
          path: artifacts/linux

      - name: Download macos artifact
        uses: actions/download-artifact@v4
        with:
          name: pptr-macos
          path: artifacts/macos

      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: pptr-windows
          path: artifacts/windows

      - name: Prepare release files
        run: |
          set -e
          mkdir -p release-files
          # copy linux
          if [ -d artifacts/linux ]; then
            cp artifacts/linux/* release-files/ 2>/dev/null || true
          fi
          # copy macos
          if [ -d artifacts/macos ]; then
            cp artifacts/macos/* release-files/ 2>/dev/null || true
          fi
          # copy windows
          if [ -d artifacts/windows ]; then
            cp artifacts/windows/* release-files/ 2>/dev/null || true
          fi
          ls -la release-files || true
        shell: bash

      - name: Generate checksums for release files
        run: |
          set -e
          if ls release-files/* 1> /dev/null 2>&1; then
            sha256sum release-files/* > release-files/SHA256SUMS || shasum -a 256 release-files/* > release-files/SHA256SUMS || true
            echo "Generated release-files/SHA256SUMS:" && cat release-files/SHA256SUMS || true
          else
            echo "No release files found to checksum";
          fi
        shell: bash

      - name: Debug: show release-files
        run: |
          echo "TAG_NAME=${TAG_NAME}"
          ls -la release-files || true
        shell: bash

      - name: Create GitHub release and upload assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
