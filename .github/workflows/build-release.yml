name: Build Release Binaries

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload to (optional)'
        required: false
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build artifacts for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: node18-linux-x64
            artifact: pptr-linux
          - os: macos-latest
            target: node18-macos-x64
            artifact: pptr-macos
          - os: windows-latest
            target: node18-win-x64
            artifact: pptr-windows
    env:
      # Resolve tag name from release event, push tag, or workflow input. Fallback to v1.9.0
      TAG_NAME: ${{ github.event.release.tag_name || github.ref_name || github.event.inputs.tag || 'v1.9.0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build binary with pkg
        run: |
          echo "Building target: ${{ matrix.target }}"
          npx pkg . --targets "${{ matrix.target }}" --out-path dist
        shell: bash

      - name: Show artifacts
        run: ls -la dist || true
        shell: bash

      - name: Normalize artifact names (macOS / Linux)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          echo "Normalizing artifacts for ${{ matrix.os }}"
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            if [ -f dist/pptr ]; then
              mv dist/pptr dist/pptr-macos || cp dist/pptr dist/pptr-macos
              chmod +x dist/pptr-macos || true
            fi
          else
            # keep linux artifact as-is and also create a linux-specific name
            if [ -f dist/pptr ]; then
              cp dist/pptr dist/pptr-linux || true
            fi
          fi

      - name: Normalize artifact names (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "Normalizing artifacts for Windows"
          if (Test-Path dist\pptr.exe) {
            Move-Item dist\pptr.exe dist\pptr-windows.exe -Force
            Copy-Item dist\pptr-windows.exe dist\pptr-windows -Force
          } elseif (Test-Path dist\pptr) {
            Move-Item dist\pptr dist\pptr-windows.exe -Force
            Copy-Item dist\pptr-windows.exe dist\pptr-windows -Force
          }

      - name: Show final artifacts
        run: ls -la dist || true
        shell: bash

      - name: Upload artifact to workflow
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download linux artifact
        uses: actions/download-artifact@v4
        with:
          name: pptr-linux
          path: artifacts/linux || true

      - name: Download macos artifact
        uses: actions/download-artifact@v4
        with:
          name: pptr-macos
          path: artifacts/macos || true

      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: pptr-windows
          path: artifacts/windows || true

      - name: Prepare release files
        run: |
          set -e
          mkdir -p release-files
          # copy linux
          if [ -d artifacts/linux ]; then
            cp artifacts/linux/* release-files/ 2>/dev/null || true
          fi
          # copy macos
          if [ -d artifacts/macos ]; then
            cp artifacts/macos/* release-files/ 2>/dev/null || true
          fi
          # copy windows
          if [ -d artifacts/windows ]; then
            cp artifacts/windows/* release-files/ 2>/dev/null || true
          fi
          ls -la release-files || true
        shell: bash

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
