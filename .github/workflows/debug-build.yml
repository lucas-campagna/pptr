name: Debug Build Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'pkg target (optional)'
        required: false

jobs:
  build:
    name: Build artifacts for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: node18-linux-x64
            artifact: pptr-linux
            platform: linux
          - os: macos-latest
            target: node18-macos-x64
            artifact: pptr-macos
            platform: macos
          - os: windows-latest
            target: node18-win-x64
            artifact: pptr-windows
            platform: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Show environment
        run: |
          echo "Runner: $RUNNER_OS"
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"
          npx pkg --version || true

      - name: Build binary with pkg (Linux/macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -e
          echo "Using target: ${{ matrix.target }}"
          npx pkg . --targets "${{ matrix.target }}" --out-path dist || true

      - name: Build binary with pkg (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "Using target: ${{ matrix.target }}"
          npx pkg . --targets "${{ matrix.target }}" --out-path dist || true

      - name: Show dist contents (diagnostic) - *nix
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          echo "Listing dist contents"
          ls -la dist || true
          if [ -d dist ]; then
            for f in dist/*; do
              echo "--- $f ---"
              file "$f" || true
            done
          fi

      - name: Show dist contents (diagnostic) - Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "Listing dist contents"
          if (Test-Path dist) {
            Get-ChildItem -Path dist -File | ForEach-Object { Write-Host "--- $($_.FullName) ---"; Write-Host $_.Length }
          }

      - name: Normalize artifact names (macOS / Linux)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          echo "Normalizing artifacts for ${{ matrix.os }}"
          set -e
          shopt -s nullglob || true
          if [ ! -d dist ]; then
            echo "dist directory missing"
            exit 0
          fi
          files=(dist/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no artifacts found in dist"
            exit 0
          fi
          chosen=""
          # prefer Mach-O on macOS, ELF on linux
          for f in "${files[@]}"; do
            if file "$f" | grep -q "Mach-O" && [ "${{ matrix.os }}" = "macos-latest" ]; then
              chosen="$f"; break
            fi
            if file "$f" | grep -q "ELF" && [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
              chosen="$f"; break
            fi
          done
          if [ -z "$chosen" ]; then
            echo "Preferred file type not found; falling back to first artifact"
            chosen=${files[0]}
          fi
          echo "Chosen artifact: $chosen"
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            cp "$chosen" dist/pptr-macos || mv "$chosen" dist/pptr-macos || true
            chmod +x dist/pptr-macos || true
          else
            cp "$chosen" dist/pptr-linux || true
            chmod +x dist/pptr-linux || true
          fi

      - name: Normalize artifact names (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "Normalizing artifacts for Windows"
          $dist = Get-ChildItem -Path dist -File -ErrorAction SilentlyContinue
          if (-not $dist) {
            Write-Host "No artifacts found in dist"
            exit 0
          }
          # prefer .exe if present
          $exe = $dist | Where-Object { $_.Name -like '*.exe' } | Select-Object -First 1
          if ($exe) {
            $chosen = $exe.FullName
          } else {
            $chosen = $dist[0].FullName
          }
          Write-Host "Chosen artifact: $chosen"
          $destExe = Join-Path -Path 'dist' -ChildPath 'pptr-windows.exe'
          Move-Item $chosen -Destination $destExe -Force
          Copy-Item $destExe 'dist\pptr-windows' -Force

      - name: Show final artifacts
        shell: bash
        run: ls -la dist || true

      - name: Upload artifact to workflow
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  # end of build job — no publish step here. This debug workflow only builds
  # platform artifacts and uploads them as workflow artifacts for inspection.
