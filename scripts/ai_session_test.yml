meta:
  browser: false
  models:
    continue: true

actions:
  - parallel:
      branches:
        - actions:
          - model_a: My name is Bob
          - log: "A1: ${result}"
          - model_a: What is my name?
          - log: "A2: ${result}"
          - model_a: What is my name?
          - log: "A3: ${result}"
        - actions:
          - model_b: My name is Alice
          - log: "B1: ${result}"
          - model_b: What is my name?
          - log: "B2: ${result}"
          - model_b: What is my name?
          - log: "B3: ${result}"

models:
  model_a:
    model: smollm2
    temperature: 0
  model_b:
    model: smollm2
    temperature: 0
