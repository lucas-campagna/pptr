meta:
  browser: false
  agents:
    continue: true
  env:
    OLLAMA_BASE_URL: "http://localhost:12434"

actions:
  - parallel:
      branches:
        - actions:
          - gemini: My name is Geminius
          - log: "A1: ${result}"
          - gemini: What is my name?
          - log: "A2: ${result}"
          - gemini: What is my name?
          - log: "A3: ${result}"
        - actions:
          - model_a: My name is Bob
          - log: "B1: ${result}"
          - model_a: What is my name?
          - log: "B2: ${result}"
          - model_a: What is my name?
          - log: "B3: ${result}"
        - actions:
          - model_b: My name is Alice
          - log: "C1: ${result}"
          - model_b: What is my name?
          - log: "C2: ${result}"
          - model_b: What is my name?
          - log: "C3: ${result}"

agents:
  gemini:
    model: "google-genai:gemini-2.5-flash"
  model_a:
    model: "ollama:smollm2"
  model_b:
    model: "ollama:smollm2"
